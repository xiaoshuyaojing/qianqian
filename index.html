<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小狗钱钱 🐕</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F97316">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小狗钱钱">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#F97316;--pl:#FB923C;--pd:#EA580C;
  --acc:#FBBF24;--green:#22C55E;--red:#EF4444;
  --teal:#06B6D4;--purple:#A855F7;
  --bg:#FFF7ED;--card:#FFFFFF;
  --text:#1C1917;--muted:#78716C;--border:#FED7AA;
  --shadow:0 2px 16px rgba(249,115,22,.12);
  --r:14px;--r2:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:900px;margin:0 auto;padding:0 16px 60px}
.header{background:linear-gradient(135deg,var(--p),var(--acc));padding:20px 24px;margin-bottom:24px;border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(249,115,22,.3)}
.header h1{color:#fff;font-size:1.6rem;font-weight:800;letter-spacing:.5px}
.header p{color:rgba(255,255,255,.85);font-size:.85rem;margin-top:4px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r2);border:none;cursor:pointer;font-size:.88rem;font-weight:600;transition:.15s}
.btn-primary{background:var(--p);color:#fff}.btn-primary:hover{background:var(--pd)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16A34A}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#DC2626}
.btn-ghost{background:transparent;color:var(--p);border:1.5px solid var(--p)}.btn-ghost:hover{background:#FFF7ED}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn-xs{padding:3px 9px;font-size:.75rem;border-radius:6px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.83rem;font-weight:600;color:var(--muted);margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:.9rem;color:var(--text);background:#fff;outline:none;transition:.15s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(249,115,22,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.toggle-label{font-size:.83rem;font-weight:600;color:var(--muted)}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#D4D0CD;border-radius:11px;transition:.25s}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.slider{background:var(--p)}
.toggle input:checked+.slider:before{transform:translateX(18px)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.proj-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1.5px solid var(--border);padding:18px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.proj-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(249,115,22,.18);border-color:var(--pl)}
.proj-card-accent{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p),var(--acc))}
.proj-card h3{font-size:1rem;font-weight:700;margin:6px 0 4px}
.proj-card .loc{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.proj-card .balance{font-size:1.4rem;font-weight:800;color:var(--p)}
.proj-card .balance-label{font-size:.75rem;color:var(--muted)}
.proj-card .progress-wrap{margin-top:10px}
.proj-card .progress-bar{height:6px;background:#FDE8D5;border-radius:3px;overflow:hidden;margin-top:4px}
.proj-card .progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));border-radius:3px;transition:.5s}
.proj-card .progress-text{font-size:.75rem;color:var(--muted);display:flex;justify-content:space-between;margin-top:3px}
.new-proj-card{border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);min-height:140px}
.new-proj-card:hover{border-color:var(--p);color:var(--p);background:rgba(249,115,22,.03)}
.proj-card-closed{opacity:.45;filter:grayscale(.6)}.proj-card-closed:hover{opacity:.65}
.new-proj-card .icon{font-size:2rem}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge-green{background:#DCFCE7;color:#166534}.badge-red{background:#FEE2E2;color:#991B1B}
.badge-blue{background:#DBEAFE;color:#1D4ED8}.badge-muted{background:#F5F5F4;color:#78716C}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:8px 12px;font-size:.78rem;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid #FEF3C7}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FFFBF5}
.amount-in{color:var(--green);font-weight:700}
.amount-out{color:var(--red);font-weight:700}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.summary-item{background:var(--card);border-radius:var(--r2);padding:14px;border:1px solid var(--border);text-align:center}
.summary-item .val{font-size:1.25rem;font-weight:800}
.summary-item .lbl{font-size:.72rem;color:var(--muted);margin-top:3px}
.val-open{color:var(--teal)}.val-in{color:var(--green)}.val-out{color:var(--red)}.val-end{color:var(--p)}
.chart-section{margin-bottom:16px}
.chart-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chart-header h3{font-size:.95rem;font-weight:700}
.date-filter{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.date-filter input{padding:5px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:.78rem;color:var(--text);background:#fff;outline:none}
.date-filter input:focus{border-color:var(--p)}
.date-filter .btn-xs{padding:4px 10px}
canvas{max-width:100%}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:.85rem}
.breadcrumb a{color:var(--p);cursor:pointer;text-decoration:none}.breadcrumb a:hover{text-decoration:underline}
.breadcrumb span{color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--card);border-radius:var(--r);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:1rem;font-weight:700}
.modal-close{cursor:pointer;font-size:1.3rem;color:var(--muted);line-height:1;background:none;border:none}.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:12px}
#toast{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:#1C1917;color:#fff;padding:10px 18px;border-radius:10px;font-size:.84rem;animation:toastIn .2s ease;pointer-events:auto}
@keyframes toastIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.tx-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tx-toolbar input[type=search]{flex:1;min-width:160px;padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:.85rem;color:var(--text);background:#fff;outline:none}
.tx-toolbar input[type=search]:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(249,115,22,.12)}
.tx-toolbar select{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:.85rem;color:var(--text);background:#fff;outline:none;cursor:pointer}
.tx-toolbar select:focus{border-color:var(--p)}
.tx-count{font-size:.78rem;color:var(--muted);white-space:nowrap}
.divider{height:1px;background:var(--border);margin:16px 0}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-tab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--muted);transition:.15s}
.filter-tab:hover:not(.active){border-color:var(--pl);color:var(--p)}
.filter-tab.active{background:var(--p);color:#fff;border-color:var(--p)}
.text-muted{color:var(--muted);font-size:.82rem}
.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ml-auto{margin-left:auto}
@media(max-width:520px){
  .summary-bar{grid-template-columns:1fr 1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="header">
  <h1>🐕 小狗钱钱</h1>
  <p>让每一分钱都有归宿</p>
  <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
    <button onclick="exportData()" style="background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.45);padding:5px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;font-weight:600">📤 导出备份</button>
    <label style="background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.45);padding:5px 14px;border-radius:8px;font-size:.78rem;cursor:pointer;font-weight:600">
      📥 导入备份<input type="file" accept=".json" id="import-input" style="display:none" onchange="importData(this)">
    </label>
  </div>
</div>
<div id="app"></div>
<div id="toast"></div>
<script>
const STORE_KEY = 'xgqq_v1';
let _cache = null, charts = {}, _chartBuilders = {};

function loadData() {
  if (_cache !== null) return _cache;
  try { _cache = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) { _cache = []; }
  return _cache;
}
function saveData(d) { _cache = d; localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function getProjects() { return loadData(); }
function getProject(id) { return loadData().find(p => p.id === id); }
function saveProject(p) {
  const d = loadData(), i = d.findIndex(x => x.id === p.id);
  if (i >= 0) d[i] = p; else d.push(p); saveData(d);
}
function deleteProject(id) { saveData(loadData().filter(p => p.id !== id)); }
function addTx(pid, tx) { const d=loadData(),p=d.find(x=>x.id===pid); if(!p)return; p.transactions.push(tx); saveData(d); }
function updateTx(pid, tx) {
  const d=loadData(),p=d.find(x=>x.id===pid); if(!p)return;
  const i=p.transactions.findIndex(t=>t.id===tx.id); if(i>=0)p.transactions[i]=tx; saveData(d);
}
function delTx(pid, txId) {
  const d=loadData(),p=d.find(x=>x.id===pid); if(!p)return;
  p.transactions=p.transactions.filter(t=>t.id!==txId); saveData(d);
}
function calcBalance(p, s, e) {
  let txs=p.transactions;
  if(s)txs=txs.filter(t=>t.date>=s); if(e)txs=txs.filter(t=>t.date<=e);
  const inp=txs.filter(t=>t.type==='input').reduce((a,t)=>a+t.amount,0);
  const out=txs.filter(t=>t.type==='output').reduce((a,t)=>a+t.amount,0);
  return {inp,out,end:p.openingBalance+inp-out,open:p.openingBalance};
}
function fmtMoney(n) {
  if(n===undefined||n===null||isNaN(n))return '¥0.00';
  return '¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(s) {
  if(!s)return '-'; const d=new Date(s);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
let state={view:'home',projectId:null};
function navigate(view,projectId){destroyCharts();_chartBuilders={};state={view,projectId:projectId||null};render();}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}
function toast(msg,dur=2200){
  const wrap=document.getElementById('toast'),el=document.createElement('div');
  el.className='toast-item';el.textContent=msg;wrap.appendChild(el);setTimeout(()=>el.remove(),dur);
}
function render(){
  const app=document.getElementById('app');
  if(state.view==='home')renderHome(app);
  else if(state.view==='new-project')renderProjectForm(app,null);
  else if(state.view==='edit-project')renderProjectForm(app,getProject(state.projectId));
  else if(state.view==='project')renderProject(app,getProject(state.projectId));
}
function renderHome(app,filter){
  const projs=getProjects();
  const activeFilter=filter||document.querySelector('.filter-tab.active')?.dataset.filter||'all';
  const cntAll=projs.length;
  const cntOngoing=projs.filter(p=>(p.status||'ongoing')==='ongoing').length;
  const cntClosed=projs.filter(p=>p.status==='closed').length;
  const filtered=activeFilter==='all'?projs:projs.filter(p=>(p.status||'ongoing')===activeFilter);
  app.innerHTML=`
    <div class="filter-tabs">
      <button class="filter-tab${activeFilter==='all'?' active':''}" data-filter="all">全部 (${cntAll})</button>
      <button class="filter-tab${activeFilter==='ongoing'?' active':''}" data-filter="ongoing">● Ongoing (${cntOngoing})</button>
      <button class="filter-tab${activeFilter==='closed'?' active':''}" data-filter="closed">◎ Closed (${cntClosed})</button>
    </div>
    <div class="proj-grid">${filtered.map(p=>projCard(p)).join('')}
    <div class="proj-card new-proj-card" id="btn-new"><div class="icon">➕</div><div style="font-weight:600;font-size:.9rem">新建存钱项目</div></div></div>`;
  document.querySelectorAll('.filter-tab').forEach(btn=>{
    btn.addEventListener('click',()=>renderHome(app,btn.dataset.filter));
  });
  document.getElementById('btn-new').addEventListener('click',()=>navigate('new-project'));
  document.querySelectorAll('[data-togglestatus]').forEach(badge=>{
    badge.addEventListener('click',e=>{
      e.stopPropagation();
      const proj=getProject(badge.dataset.togglestatus);if(!proj)return;
      const next=proj.status==='closed'?'ongoing':'closed';
      const label=next==='ongoing'?'进行中 (Ongoing)':'已归档 (Closed)';
      if(!confirm(`确认将「${proj.name||proj.description}」的状态切换为【${label}】？`))return;
      proj.status=next;
      saveProject(proj);
      renderHome(app,activeFilter);
    });
  });
  document.querySelectorAll('[data-projid]').forEach(el=>{el.addEventListener('click',()=>navigate('project',el.dataset.projid));});
}
function projCard(p){
  const bal=calcBalance(p),pct=p.targetAmount?Math.min(100,(bal.inp/p.targetAmount*100)).toFixed(1):null;
  const hp=p.period&&(p.period.start||p.period.end);
  const status=p.status||'ongoing';
  return `<div class="proj-card${status==='closed'?' proj-card-closed':''}" data-projid="${p.id}"><div class="proj-card-accent"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <h3 style="margin:0;flex:1;padding-right:8px">${p.name||'未命名项目'}</h3>
      <span class="badge ${status==='ongoing'?'badge-green':'badge-muted'}" data-togglestatus="${p.id}" title="点击切换状态" style="cursor:pointer;user-select:none;flex-shrink:0">${status==='ongoing'?'● Ongoing':'◎ Closed'}</span>
    </div>
    ${p.description?`<div style="font-size:.78rem;color:var(--muted);margin-bottom:4px">${p.description}</div>`:''}
    <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px">${p.storageLocation||'未设置存储位置'}</div>
    ${hp?`<div class="loc">📅 ${p.period.start?fmtDate(p.period.start):'...'} ~ ${p.period.end?fmtDate(p.period.end):'...'}</div>`
        :'<div class="loc">无固定期间</div>'}
    <div class="balance-label">结余</div><div class="balance">${fmtMoney(bal.end)}</div>
    ${pct!==null?`<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-text"><span>已存入 ${pct}%</span><span>目标 ${fmtMoney(p.targetAmount)}</span></div></div>`:''}</div>`;
}
function renderProjectForm(app,proj){
  const isEdit=!!proj;
  app.innerHTML=`
  <div class="breadcrumb"><a id="bc-home">🏠 首页</a><span>›</span><span>${isEdit?'编辑项目':'新建项目'}</span></div>
  <div class="card"><div class="card-title">🐕 ${isEdit?'编辑':'新建'}存钱项目</div>
    <div class="form-group"><label>目标名称 <span style="color:var(--red)">*</span></label>
      <input id="f-name" placeholder="e.g. 旅游基金、换手机……" value="${proj?.name||''}">
    </div>
    <div class="form-group"><label>目标描述</label>
      <input id="f-desc" placeholder="可选，补充说明目标详情" value="${proj?.description||''}">
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="f-has-target" ${proj?.targetAmount?'checked':''}><span class="slider"></span></label>
      <span class="toggle-label">设置目标金额</span></div>
    <div id="target-wrap" style="${proj?.targetAmount?'':'display:none'}">
      <div class="form-group"><label>目标金额（¥）</label>
        <input id="f-target" type="number" min="0" placeholder="0.00" value="${proj?.targetAmount||''}">
      </div></div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="f-has-period" ${(proj?.period?.start||proj?.period?.end)?'checked':''}><span class="slider"></span></label>
      <span class="toggle-label">设置期间</span></div>
    <div id="period-wrap" style="${(proj?.period?.start||proj?.period?.end)?'':'display:none'}">
      <div class="form-row">
        <div class="form-group"><label>开始日期</label><input id="f-start" type="date" value="${proj?.period?.start||''}">
        </div>
        <div class="form-group"><label>结束日期</label><input id="f-end" type="date" value="${proj?.period?.end||''}">
        </div></div></div>
    <div class="form-group"><label>存储位置</label>
      <input id="f-loc" placeholder="e.g. 招商银行6位尾号、支付宝……" value="${proj?.storageLocation||''}">
    </div>
    <div class="form-group"><label>Opening Balance（初始金额，¥）</label>
      <input id="f-open" type="number" min="0" placeholder="0.00" value="${proj?.openingBalance??''}">
    </div>
    <div class="form-group"><label>项目状态</label>
      <select id="f-status">
        <option value="ongoing" ${(proj?.status||'ongoing')==='ongoing'?'selected':''}>● 进行中 (Ongoing)</option>
        <option value="closed" ${proj?.status==='closed'?'selected':''}>◎ 已归档 (Closed)</option>
      </select>
    </div>

    <div class="flex-row" style="margin-top:4px">
      <button class="btn btn-primary" id="btn-save">💾 ${isEdit?'保存修改':'创建项目'}</button>
      ${isEdit?`<button class="btn btn-danger btn-sm" id="btn-del">🗑 删除项目</button>`:''}
      <button class="btn btn-ghost btn-sm ml-auto" id="btn-cancel">取消</button></div></div>`;
  document.getElementById('f-has-target').addEventListener('change',e=>{document.getElementById('target-wrap').style.display=e.target.checked?'':'none';});
  document.getElementById('f-has-period').addEventListener('change',e=>{document.getElementById('period-wrap').style.display=e.target.checked?'':'none';});

  document.getElementById('bc-home').addEventListener('click',()=>navigate('home'));
  document.getElementById('btn-cancel').addEventListener('click',()=>isEdit?navigate('project',proj.id):navigate('home'));
  document.getElementById('btn-save').addEventListener('click',()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name){toast('请填写目标名称');return;}
    const desc=document.getElementById('f-desc').value.trim();
    const hasTarget=document.getElementById('f-has-target').checked;
    const targetAmount=hasTarget?parseFloat(document.getElementById('f-target').value)||0:null;
    const hasPeriod=document.getElementById('f-has-period').checked;
    const period=hasPeriod?{start:document.getElementById('f-start').value||null,end:document.getElementById('f-end').value||null}:{start:null,end:null};
    const p={id:proj?.id||uid(),name,description:desc,targetAmount,period,
      storageLocation:document.getElementById('f-loc').value.trim(),
      openingBalance:parseFloat(document.getElementById('f-open').value)||0,

function renderTxTable(p){

      btn.addEventListener('click',()=>{
        const idx=parseInt(btn.dataset.idx),row=btn.closest('.ilm-row'),oldName=p.outputLabels[idx];
        row.innerHTML=`<input class="ilm-edit-input" value="${oldName}" style="flex:1;padding:4px 7px;border:1.5px solid var(--p);border-radius:var(--r2);font-size:.85rem;outline:none;font-family:inherit">
          <button class="btn btn-primary btn-xs ilm-ok">✓</button>
          <button class="btn btn-ghost btn-xs ilm-cancel">✕</button>`;
        const inp=row.querySelector('.ilm-edit-input');inp.focus();inp.select();
        function doSave(){
          const v=inp.value.trim();
          if(!v){toast('标签名不能为空');inp.focus();return;}
          if(v!==oldName&&p.outputLabels.includes(v)){toast('标签名已存在');inp.focus();return;}
          if(v!==oldName){
            p.transactions.forEach(t=>{if(t.label===oldName)t.label=v;});
            p.outputLabels[idx]=v;saveProject(p);refreshLabelSelect(v);
            if(p.transactions.some(t=>t.label===v)){const fresh=getProject(p.id);renderTxTable(fresh);rebuildAllCharts();}
            toast('✅ 标签已修改');
          }
          renderInlineBody();
        }
        row.querySelector('.ilm-ok').addEventListener('click',doSave);
        inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSave();}if(e.key==='Escape')renderInlineBody();});
        row.querySelector('.ilm-cancel').addEventListener('click',renderInlineBody);
      });
    });
  }
  document.getElementById('lm-toggle-btn').addEventListener('click',()=>{
    const panel=document.getElementById('lm-inline'),isOpen=panel.style.display!=='none';
    panel.style.display=isOpen?'none':'';
    document.getElementById('lm-toggle-btn').textContent=isOpen?'⚙️ 管理标签':'⚙️ 收起管理';
    if(!isOpen)renderInlineBody();
  });
  document.getElementById('lm-inline-add-btn').addEventListener('click',()=>{
    document.getElementById('lm-inline-add-btn').style.display='none';
    document.getElementById('lm-inline-add-wrap').style.display='';
    document.getElementById('lm-inline-add-input').focus();
  });
  function confirmInlineAdd(){
    const v=document.getElementById('lm-inline-add-input').value.trim();
    if(!v){toast('请输入标签名');return;}
    if(p.outputLabels.includes(v)){toast('标签已存在');return;}
    p.outputLabels.push(v);saveProject(p);
    refreshLabelSelect(v);
    document.getElementById('lm-inline-add-input').value='';
    document.getElementById('lm-inline-add-wrap').style.display='none';
    document.getElementById('lm-inline-add-btn').style.display='';
    renderInlineBody();toast('✅ 标签已添加');
  }
  document.getElementById('lm-inline-add-ok').addEventListener('click',confirmInlineAdd);
  document.getElementById('lm-inline-add-input').addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();confirmInlineAdd();}
    if(e.key==='Escape'){document.getElementById('lm-inline-add-input').value='';document.getElementById('lm-inline-add-wrap').style.display='none';document.getElementById('lm-inline-add-btn').style.display='';}
  });
  document.getElementById('lm-inline-add-cancel').addEventListener('click',()=>{
    document.getElementById('lm-inline-add-input').value='';
    document.getElementById('lm-inline-add-wrap').style.display='none';
    document.getElementById('lm-inline-add-btn').style.display='';
  });

  function closeModal(){bg.remove();}
  document.getElementById('modal-close').addEventListener('click',closeModal);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
  document.getElementById('modal-save').addEventListener('click',()=>{
    const type=bg.querySelector('[name=tx-type]:checked')?.value||'input';
    const amount=parseFloat(document.getElementById('tx-amount').value);
    const date=document.getElementById('tx-date').value;
    const label=type==='output'?document.getElementById('tx-label').value:null;
    const note=document.getElementById('tx-note').value.trim();
    if(!amount||amount<=0){toast('请输入有效金额');return;}
    if(!date){toast('请选择日期');return;}
    const tx={id:isEdit?existingTx.id:uid(),type,amount,date,label:label||null,note};
    if(isEdit)updateTx(p.id,tx);else addTx(p.id,tx);
    closeModal();const fresh=getProject(p.id);
    renderTxTable(fresh);refreshSummary(fresh);rebuildAllCharts();
    toast(isEdit?'✅ 记录已更新':(type==='input'?'🎉 存入记录已添加':'📝 支出记录已添加'));});
}
function exportData(){
  const raw=localStorage.getItem(STORE_KEY)||'[]';
  const blob=new Blob([raw],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='小狗钱钱备份_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);toast('📤 备份文件已下载');
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data))throw new Error('格式不符');
      if(!confirm(`即将导入 ${data.length} 个存钱项目，当前数据将被覆盖，确认继续？`)){input.value='';return;}
      _cache=null;saveData(data);input.value='';navigate('home');toast('📥 数据导入成功！');
    }catch(err){toast('❌ 文件格式有误，请选择正确的备份文件');input.value='';}
  };
  reader.readAsText(file);
}
render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
